<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab InovAção - Copa do Mundo</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --azul: #0038A8;
            --amarelo: #FFD100;
            --verde: #009B3A;
            --verde-claro: #3cb043;
            --verde-escuro: #2a7e2b;
            --branco: #FFFFFF;
        }
        * { box-sizing: border-box; }
        
        body { 
            margin: 0; font-family: 'Segoe UI', Arial, sans-serif; 
            background: radial-gradient(circle, #005596 0%, #001a33 100%);
            color: #333; overflow-x: hidden;
            height: 100vh; display: flex; flex-direction: column;
        }

        /* Overlay para liberar o Áudio */
        #bloqueioAudio {
            position: fixed; inset: 0; background: var(--verde); z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: white; text-align: center;
        }
        #bloqueioAudio h1 { font-size: 50px; text-transform: uppercase; color: var(--amarelo); text-shadow: 2px 2px 0 var(--azul); }
        #bloqueioAudio button {
            background: var(--amarelo); color: var(--azul); font-size: 24px; padding: 15px 40px;
            border: none; border-radius: 50px; cursor: pointer; font-weight: bold; box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            transition: 0.3s;
        }
        #bloqueioAudio button:hover { transform: scale(1.1); }

        header { 
            background: rgba(0, 0, 0, 0.7); color: var(--amarelo); text-align: center; padding: 15px; 
            border-bottom: 5px solid var(--verde); box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            z-index: 10; flex-shrink: 0;
        }
        h1 { margin: 0; font-size: 28px; text-transform: uppercase; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); letter-spacing: 1px; }

        .layout { 
            display: flex; gap: 20px; padding: 20px; flex: 1; overflow: hidden;
            max-width: 1800px; margin: auto; width: 100%;
        }
        
        /* Estádio e Campo Dinâmico */
        .estadio-container { 
            flex: 1; background: rgba(0,0,0,0.4); padding: 10px; border-radius: 15px; 
            box-shadow: inset 0 0 50px rgba(0,0,0,0.8); overflow-y: auto; position: relative;
        }
        
        /* Custom Scrollbar para o Estádio */
        .estadio-container::-webkit-scrollbar { width: 12px; }
        .estadio-container::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); border-radius: 10px; }
        .estadio-container::-webkit-scrollbar-thumb { background: var(--amarelo); border-radius: 10px; }

        .campo {
            position: relative; border-radius: 8px; overflow: hidden;
            border: 5px solid var(--branco); box-shadow: 0 0 30px rgba(0,0,0,0.5);
            background: repeating-linear-gradient(90deg, var(--verde-claro) 0, var(--verde-claro) 80px, var(--verde-escuro) 80px, var(--verde-escuro) 160px);
            transition: height 0.5s; min-height: 100%;
        }
        
        /* Marcações do Campo */
        .campo:before { content: ""; position: absolute; left: 50%; top: 0; bottom: 0; width: 5px; background: rgba(255,255,255,0.7); transform: translateX(-50%); }
        .circulo { position: absolute; left: 50%; top: 50vh; width: 150px; height: 150px; border: 5px solid rgba(255,255,255,0.7); border-radius: 50%; transform: translate(-50%, -50%); }
        
        .area-gol { 
            position: absolute; right: 0; top: 0; bottom: 0; width: 120px; 
            border-left: 5px solid rgba(255,255,255,0.7);
            background: linear-gradient(90deg, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0) 100%);
        }
        .rede {
            position: absolute; right: 0; top: 0; bottom: 0; width: 50px;
            background-image: radial-gradient(#fff 1px, transparent 0), radial-gradient(#fff 1px, transparent 0);
            background-size: 10px 10px; background-position: 0 0, 5px 5px; opacity: 0.3;
        }
        
        /* Jogadores */
        .player { position: absolute; transition: left 1.5s cubic-bezier(0.25, 1, 0.5, 1); display: flex; align-items: center; z-index: 10; width: 100%; }
        .jogador-info { 
            background: var(--branco); padding: 4px 10px; border-radius: 20px; border: 3px solid var(--azul); 
            margin-right: 10px; display: flex; align-items: center; gap: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            min-width: 180px;
        }
        .nome { color: var(--azul); font-size: 16px; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 120px; }
        .pts { background: var(--verde); color: var(--branco); padding: 2px 8px; border-radius: 10px; font-weight: 900; }
        .bola { font-size: 28px; filter: drop-shadow(2px 4px 4px rgba(0,0,0,0.6)); transition: transform 1.5s; }
        .bola.girando { transform: rotate(720deg); }

        /* Sidebar e Controles */
        .sidebar { 
            width: 450px; background: var(--branco); border-radius: 15px; padding: 20px; 
            display: flex; flex-direction: column; box-shadow: -5px 0 30px rgba(0,0,0,0.5);
        }
        .scroll-controles { overflow-y: auto; flex: 1; padding-right: 10px; }
        .scroll-controles::-webkit-scrollbar { width: 8px; }
        .scroll-controles::-webkit-scrollbar-thumb { background: #ccc; border-radius: 4px; }

        h3 { color: var(--verde); margin-top: 0; border-bottom: 2px solid var(--amarelo); padding-bottom: 5px; text-transform: uppercase; }
        input, select { width: 100%; padding: 10px; margin: 5px 0; border: 2px solid #ddd; border-radius: 8px; font-size: 14px; }
        .linha-add { display: flex; gap: 5px; margin-bottom: 10px; }
        .linha-add select { width: 70px; font-size: 20px; }
        
        button { border: none; border-radius: 6px; padding: 8px; margin: 2px; font-weight: bold; color: #fff; background: var(--azul); cursor: pointer; transition: 0.2s; }
        button:hover { filter: brightness(1.2); transform: scale(1.05); }
        .btn-add { width: 100%; padding: 12px; background: var(--verde); font-size: 16px; margin-bottom: 10px; color: white; text-transform: uppercase; }
        
        .card { background: #f8f9fa; border-left: 5px solid var(--amarelo); border-radius: 8px; padding: 10px; margin-bottom: 10px; border-bottom: 1px solid #ddd; }
        .card input { margin: 0; width: 50%; padding: 4px; border: none; background: transparent; font-weight: bold; color: var(--azul); }
        .btn-group { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 8px; }
        .btn-group button { flex: 1; min-width: 40px; font-size: 12px; }
        .btn-var { background: #dc3545; flex-basis: 100%; }

        /* Gol Msg */
        #golMsg { display: none; position: fixed; inset: 0; background: rgba(0, 0, 0, 0.9); color: #fff; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; }
        .texto-gol { font-size: 10vw; font-weight: 900; color: var(--amarelo); text-shadow: 0 0 20px var(--verde), 0 0 40px var(--azul); animation: pulsaGol 0.3s alternate infinite; margin:0; line-height: 1; }
        .nome-gol { font-size: 4vw; margin-top: 10px; color: #fff; text-transform: uppercase; text-align: center; }
        @keyframes pulsaGol { from { transform: scale(1); } to { transform: scale(1.1); } }
    </style>
</head>
<body>

<!-- Tela de Liberação de Áudio (Requisito dos navegadores modernos) -->
<div id="bloqueioAudio">
    <h1>🏆 Copa InovAção</h1>
    <p style="font-size: 20px; margin-bottom: 30px;">Para a torcida e o narrador funcionarem, clique abaixo!</p>
    <button onclick="iniciarEvento()">▶ INICIAR EVENTO</button>
</div>

<!-- Efeitos de Fundo Contínuos -->
<audio id="audioTorcida" src="https://upload.wikimedia.org/wikipedia/commons/1/1a/Football_crowd_-_cheering_and_chants.ogg" loop preload="auto"></audio>

<header>
    <h1>Lab InovAção - Etapa II da 18ª Semana de Aperfeiçoamento Docente</h1>
</header>

<div class="layout">
    <div class="estadio-container">
        <div class="campo" id="campo">
            <div class="circulo"></div>
            <div class="area-gol"></div>
            <div class="rede"></div>
        </div>
    </div>

    <div class="sidebar">
        <h3>Escalação</h3>
        <div class="linha-add">
            <select id="avatarNovo">
                <option value="🇧🇷">🇧🇷</option><option value="🏃">🏃</option><option value="👩‍🏫">👩‍🏫</option>
                <option value="👨‍🏫">👨‍🏫</option><option value="⚽">⚽</option><option value="⭐">⭐</option>
            </select>
            <input id="nomeNovo" placeholder="Nome (Ex: Equipe 1)">
        </div>
        <button class="btn-add" onclick="add()">➕ Escalar Participante</button>

        <div style="display: flex; gap: 5px; margin-bottom: 10px;">
            <button style="flex:1; background: #666;" onclick="narrar('Atenção, vai começar a partida!')">🎙️ Testar Narrador</button>
            <button style="flex:1; background: var(--azul);" onclick="zerarTudo()">🔄 Zerar Placar</button>
        </div>

        <h3>Controle do Jogo</h3>
        <div class="scroll-controles" id="controles"></div>
    </div>
</div>

<div id="golMsg">
    <div class="texto-gol">GOOOOOOL!</div>
    <div class="nome-gol" id="nomeArtilheiro">Equipe</div>
</div>

<script>
let participantes = JSON.parse(localStorage.getItem('copaLabFinal')) || [];
const audioTorcida = document.getElementById('audioTorcida');

// --- SÍNTESE DE VOZ (NARRADOR VIRTUAL) ---
function narrar(texto, tipo = 'normal') {
    if (!window.speechSynthesis) return;
    
    // Cancela falas anteriores para não encavalar
    window.speechSynthesis.cancel(); 
    
    let msg = new SpeechSynthesisUtterance();
    msg.text = texto;
    msg.lang = 'pt-BR';
    
    // Ajustes para simular narração de futebol
    if(tipo === 'gol') {
        msg.rate = 0.8; // Mais lento para prolongar o grito
        msg.pitch = 1.2;
        msg.volume = 1;
    } else {
        msg.rate = 1.4; // Mais rápido e dinâmico
        msg.pitch = 1.1;
        msg.volume = 0.8;
    }

    // Tenta forçar uma voz masculina do Google/Microsoft se disponível
    let vozes = window.speechSynthesis.getVoices();
    let vozBR = vozes.find(v => v.lang === 'pt-BR' && (v.name.includes('Google') || v.name.includes('Maria') === false));
    if(vozBR) msg.voice = vozBR;

    window.speechSynthesis.speak(msg);
}

// Carrega as vozes antecipadamente
window.speechSynthesis.onvoiceschanged = function() { window.speechSynthesis.getVoices(); };

// --- CONTROLE DE ÁUDIO ---
function iniciarEvento() {
    document.getElementById('bloqueioAudio').style.display = 'none';
    audioTorcida.volume = 0.15;
    audioTorcida.play().catch(e => console.log("Torcida não pôde iniciar"));
    narrar("Bem vindos ao Lab InovAção! Que comecem os jogos!");
    render();
}

// --- LÓGICA DO JOGO ---
function save() { localStorage.setItem('copaLabFinal', JSON.stringify(participantes)); }

function add() {
    let n = document.getElementById('nomeNovo').value.trim();
    let av = document.getElementById('avatarNovo').value;
    if (!n) return;
    participantes.push({ id: Date.now(), nome: n, avatar: av, pontos: 0 });
    document.getElementById('nomeNovo').value = '';
    narrar("Novo jogador em campo: " + n);
    render();
}

function editar(id, v) {
    let p = participantes.find(x => x.id === id);
    if (p) { p.nome = v; save(); render(); }
}

const frasesPonto = ["Bela jogada do ", "Que passe incrível do ", "Subindo no ataque, "];

function alterar(id, v) {
    let p = participantes.find(x => x.id === id);
    if (!p) return;
    
    let pontosAnteriores = p.pontos;
    p.pontos = Math.max(0, p.pontos + v);
    
    if(v > 0) animarBola(id);

    if (p.pontos >= 100 && pontosAnteriores < 100) { 
        dispararGol(p.nome); 
    } else if (v > 0) { 
        // Escolhe uma frase aleatória + o nome do jogador
        let frase = frasesPonto[Math.floor(Math.random() * frasesPonto.length)] + p.nome;
        narrar(frase);
    } else if (v < 0) {
        narrar("Ih, falta marcada! O VAR tirou pontos do " + p.nome);
    }
    
    render();
}

function dispararGol(nome) {
    let m = document.getElementById('golMsg');
    document.getElementById('nomeArtilheiro').innerText = nome;
    m.style.display = 'flex';
    
    // Grito de gol usando o sintetizador
    narrar("Goooooooooooooooooooooooooooool! É do " + nome + "!", 'gol');
    
    audioTorcida.volume = 0.5; // Aumenta torcida no gol
    
    if (typeof confetti === 'function') {
        let fim = Date.now() + 4000;
        (function frame() {
            confetti({ particleCount: 8, angle: 60, spread: 60, origin: { x: 0 }, colors: ['#0038A8', '#FFD100', '#009B3A'] });
            confetti({ particleCount: 8, angle: 120, spread: 60, origin: { x: 1 }, colors: ['#0038A8', '#FFD100', '#009B3A'] });
            if (Date.now() < fim) requestAnimationFrame(frame);
        }());
    }

    setTimeout(() => { 
        m.style.display = 'none'; 
        audioTorcida.volume = 0.15; // Volta volume normal
    }, 5000);
}

function animarBola(id) {
    let bola = document.getElementById(`bola-${id}`);
    if(bola) {
        bola.classList.add('girando');
        setTimeout(() => bola.classList.remove('girando'), 1500);
    }
}

function excluirP(id) {
    if(confirm('Expulsar jogador?')) { participantes = participantes.filter(x => x.id !== id); render(); }
}

function zerarTudo() { 
    if(confirm('Zerar placar?')) { participantes.forEach(p => p.pontos = 0); render(); }
}

function render() {
    save();
    
    // Ordena do maior pro menor
    let rank = [...participantes].sort((a, b) => b.pontos - a.pontos);

    // Ajusta a altura do campo dependendo da quantidade de jogadores para caber até 40 pessoas
    let alturaNecessaria = (participantes.length * 60) + 100;
    let campo = document.getElementById('campo');
    campo.style.minHeight = Math.max(800, alturaNecessaria) + 'px';

    document.getElementById('controles').innerHTML = rank.map(p => `
    <div class='card'>
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <span>${p.avatar}</span>
            <input value="${p.nome}" onchange="editar(${p.id}, this.value)">
            <strong style="color: var(--verde); font-size: 16px;">${p.pontos} pts</strong>
        </div>
        <div class='btn-group'>
            <button onclick="alterar(${p.id}, 2)">+2</button>
            <button onclick="alterar(${p.id}, 6)">+6</button>
            <button onclick="alterar(${p.id}, 8)">+8</button>
            <button onclick="alterar(${p.id}, 10)">+10</button>
            <button onclick="alterar(${p.id}, 25)">+25</button>
            <button onclick="alterar(${p.id}, 50)">+50</button>
            <button style="background:#dc3545;" onclick="excluirP(${p.id})">🗑️</button>
            <button class="btn-var" onclick="alterar(${p.id}, -10)">VAR (-10)</button>
        </div>
    </div>`).join('');

    campo.querySelectorAll('.player').forEach(e => e.remove());

    rank.forEach((p, i) => {
        let d = document.createElement('div');
        d.className = 'player';
        
        // Espaçamento dinâmico: 55px por jogador, começando do topo (20px)
        d.style.top = (20 + i * 55) + 'px';
        
        // Posição: 90% é o gol.
        let progresso = Math.min((p.pontos / 100) * 90, 90);
        d.style.left = progresso + '%';
        
        d.innerHTML = `
            <div class='jogador-info'>
                <span>${p.avatar}</span>
                <span class='nome' title="${p.nome}">${i+1}º ${p.nome}</span>
                <span class='pts'>${p.pontos}</span>
            </div>
            <div class='bola' id='bola-${p.id}'>⚽</div>
        `;
        campo.appendChild(d);
    });
}
</script>
</body>
</html>
