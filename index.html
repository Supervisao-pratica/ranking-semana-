<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏆 Lab InovAção - Copa do Mundo do Conhecimento</title>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

    <style>

        :root{
            --azul:#005596;
            --laranja:#ff7f00;
            --grama-clara:#3a8220;
            --grama-escura:#306e18;
            --vidro:rgba(255,255,255,.92);
        }

        *{
            box-sizing:border-box;
            margin:0;
            padding:0;
        }

        body{
            font-family:'Segoe UI',Arial,sans-serif;
            color:#333;
            overflow-x:hidden;

            background:linear-gradient(
                -45deg,
                #005596,
                #00873E,
                #FFCC00,
                #ff7f00
            );

            background-size:400% 400%;
            animation:gradientBG 15s ease infinite;
        }

        @keyframes gradientBG{
            0%{background-position:0% 50%;}
            50%{background-position:100% 50%;}
            100%{background-position:0% 50%;}
        }

        /* =========================
           FUNDO ANIMADO
        ========================== */

        .decoracao-fundo{
            position:fixed;
            inset:0;
            pointer-events:none;
            z-index:-1;
            overflow:hidden;
            opacity:.65;
        }

        .flutuante{
            position:absolute;
            bottom:-50px;
            font-size:30px;
            animation:subir linear infinite;
            filter:drop-shadow(0 6px 10px rgba(0,0,0,.3));
            opacity:.85;
            will-change:transform,opacity;
        }

        @keyframes subir{
            0%{
                opacity:0;
                transform:
                translateY(0)
                rotate(0deg)
                scale(.75);
            }

            12%{
                opacity:.9;
            }

            78%{
                opacity:.9;
            }

            to{
                opacity:0;
                transform:
                translateY(-110vh)
                rotate(360deg)
                scale(1.2);
            }
        }

        /* =========================
           HEADER
        ========================== */

        header{
            background:rgba(0,0,0,.65);
            color:#fff;
            text-align:center;

            padding:20px;

            border-bottom:4px solid var(--laranja);

            backdrop-filter:blur(8px);

            display:flex;
            flex-direction:column;
            align-items:center;
            gap:12px;

            box-shadow:0 4px 20px rgba(0,0,0,.35);
        }

        h1{
            font-size:32px;
            text-transform:uppercase;
            text-shadow:
            2px 2px 5px rgba(0,0,0,.8);
        }

        /* =========================
           BOTÃO DE SOM
        ========================== */

        #ativarSomBtn{
            background:#28a745;
            color:#fff;
            border:none;
            padding:12px 20px;
            border-radius:10px;
            cursor:pointer;
            font-size:16px;
            font-weight:700;
            animation:pulsoSom 1.6s ease-in-out infinite;
        }

        #ativarSomBtn:hover{
            transform:scale(1.05);
        }

        #ativarSomBtn.som-ligado{
            background:#005596;
            animation:none;
        }

        @keyframes pulsoSom{
            0%,100%{
                box-shadow:0 0 0 0 rgba(40,167,69,.45);
            }

            50%{
                box-shadow:0 0 0 12px rgba(40,167,69,0);
            }
        }

        /* =========================
           LAYOUT
        ========================== */

        .layout{
            display:grid;
            grid-template-columns:1fr 450px;

            gap:20px;

            padding:20px;

            max-width:1900px;

            margin:auto;
        }

        /* =========================
           CAMPO
        ========================== */

        .campo{

            position:relative;

            min-height:3200px;

            border-radius:12px;

            overflow-y:auto;
            overflow-x:hidden;

            border:6px solid #fff;

            box-shadow:
            0 0 20px rgba(255,255,255,.4),
            inset 0 0 40px rgba(0,0,0,.15);

            background:
            repeating-linear-gradient(
                90deg,
                var(--grama-clara) 0,
                var(--grama-clara) 100px,
                var(--grama-escura) 100px,
                var(--grama-escura) 200px
            );

            padding-bottom:120px;
        }

        .campo:before{
            content:"";
            position:absolute;

            left:50%;
            top:0;
            bottom:0;

            width:6px;

            background:rgba(255,255,255,.85);

            transform:translateX(-50%);
            z-index:1;
            pointer-events:none;
        }

        .campo:after{
            content:"";
            position:absolute;
            inset:0;
            pointer-events:none;
            z-index:2;
            background:linear-gradient(
                110deg,
                transparent 0 38%,
                rgba(255,255,255,.16) 46%,
                transparent 55% 100%
            );
            transform:translateX(-120%);
            animation:campoBrilho 8s ease-in-out infinite;
        }

        @keyframes campoBrilho{
            0%,45%{
                transform:translateX(-120%);
            }

            80%,100%{
                transform:translateX(120%);
            }
        }

        .circulo{
            position:absolute;

            left:50%;
            top:50%;

            width:220px;
            height:220px;

            border-radius:50%;
            border:6px solid rgba(255,255,255,.85);

            transform:translate(-50%,-50%);
            z-index:1;
            pointer-events:none;
        }

        .area-gol{
            position:absolute;

            right:0;
            top:50%;

            transform:translateY(-50%);

            width:150px;
            height:350px;

            border:6px solid rgba(255,255,255,.85);
            border-right:none;
            z-index:1;
            pointer-events:none;
        }

        /* =========================
           JOGADORES
        ========================== */

        .player{
            position:absolute;

            display:flex;
            align-items:center;

            z-index:10;

            transition:
            left .9s cubic-bezier(
                0.34,
                1.56,
                0.64,
                1
            ),
            top .35s ease;
            will-change:left,top,transform;
        }

        .player.entrando{
            animation:entraJogador .45s ease both;
        }

        .player.saindo{
            animation:saiJogador .28s ease forwards;
            pointer-events:none;
        }

        .player.avancando .jogador-info{
            animation:impulsoJogador .65s ease;
        }

        .player.avancando .bola{
            animation:chuteBola .65s ease;
        }

        .jogador-info{

            background:rgba(255,255,255,.95);

            padding:6px 12px;

            border-radius:30px;

            border:3px solid var(--laranja);

            margin-right:10px;

            display:flex;
            align-items:center;
            gap:8px;

            box-shadow:
            0 4px 10px rgba(0,0,0,.5);
            transition:box-shadow .25s ease, transform .25s ease;
        }

        .avatar-em-campo{
            font-size:24px;
        }

        .nome{
            color:var(--azul);
            font-size:16px;
            font-weight:bold;
            white-space:nowrap;
        }

        .pts{
            background:var(--laranja);
            color:white;

            padding:2px 8px;

            border-radius:10px;

            font-weight:900;
        }

        .bola{
            font-size:30px;

            filter:drop-shadow(
                2px 4px 4px rgba(0,0,0,.6)
            );
        }

        .bola.girando{
            animation:
            girarBola .55s linear infinite,
            quicarBola .45s ease-in-out 2;
        }

        @keyframes girarBola{
            from{
                transform:rotate(0deg);
            }
            to{
                transform:rotate(360deg);
            }
        }

        @keyframes quicarBola{
            0%,100%{
                translate:0 0;
            }

            50%{
                translate:0 -9px;
            }
        }

        @keyframes chuteBola{
            0%{
                transform:translateX(0) scale(1);
            }

            45%{
                transform:translateX(20px) scale(1.2) rotate(160deg);
            }

            100%{
                transform:translateX(0) scale(1) rotate(360deg);
            }
        }

        @keyframes impulsoJogador{
            0%{
                transform:translateY(0);
                box-shadow:0 4px 10px rgba(0,0,0,.5);
            }

            45%{
                transform:translateY(-6px) scale(1.04);
                box-shadow:0 12px 22px rgba(0,0,0,.45);
            }

            100%{
                transform:translateY(0);
                box-shadow:0 4px 10px rgba(0,0,0,.5);
            }
        }

        @keyframes entraJogador{
            from{
                opacity:0;
                transform:translateX(-24px) scale(.9);
            }

            to{
                opacity:1;
                transform:translateX(0) scale(1);
            }
        }

        @keyframes saiJogador{
            to{
                opacity:0;
                transform:translateX(24px) scale(.88);
            }
        }

        .pontos-pop{
            position:absolute;
            right:-34px;
            top:-18px;
            background:#FFD700;
            color:#003b6f;
            border:2px solid #fff;
            border-radius:999px;
            padding:2px 8px;
            font-size:14px;
            font-weight:900;
            box-shadow:0 6px 14px rgba(0,0,0,.35);
            animation:sobePontos .9s ease forwards;
            pointer-events:none;
        }

        @keyframes sobePontos{
            to{
                opacity:0;
                transform:translateY(-34px) scale(1.18);
            }
        }

        /* =========================
           SIDEBAR
        ========================== */

        .sidebar{

            background:var(--vidro);

            border-radius:15px;

            padding:20px;

            max-height:95vh;

            overflow-y:auto;
            overflow-x:hidden;

            box-shadow:
            0 10px 30px rgba(0,0,0,.5);

            backdrop-filter:blur(10px);
        }

        h3{
            color:var(--azul);

            margin-top:0;

            border-bottom:2px solid #ddd;

            padding-bottom:5px;
        }

        input,
        select{

            width:100%;

            padding:10px;

            margin:5px 0 15px 0;

            border:1px solid #ccc;

            border-radius:8px;

            font-size:16px;
        }

        .linha-add{
            display:flex;
            gap:10px;
        }

        .linha-add select{
            width:80px;
            font-size:24px;
            padding:5px;
        }

        button{

            border:none;

            border-radius:6px;

            padding:8px;

            margin:2px;

            font-weight:bold;

            color:#fff;

            background:var(--azul);

            cursor:pointer;

            transition:.2s;

            box-shadow:
            0 2px 5px rgba(0,0,0,.2);
        }

        button:hover{
            filter:brightness(1.2);
            transform:scale(1.05);
        }

        .btn-add{
            width:100%;
            padding:12px;
            background:#28a745;
            font-size:16px;
            margin-bottom:10px;
        }

        /* =========================
           CARDS
        ========================== */

        .card{
            background:#fff;

            border-left:5px solid var(--azul);

            border-radius:8px;

            padding:10px;

            margin-bottom:15px;

            box-shadow:
            0 4px 6px rgba(0,0,0,.1);
            animation:entraCard .22s ease both;
        }

        @keyframes entraCard{
            from{
                opacity:.3;
                transform:translateY(6px);
            }

            to{
                opacity:1;
                transform:translateY(0);
            }
        }

        .card input{
            margin:0;
            width:60%;
            padding:4px;
            border:none;
            font-weight:bold;
            color:var(--azul);
            font-size:16px;
        }

        .btn-group{
            display:grid;
            grid-template-columns:repeat(4,1fr);
            gap:4px;
            margin-top:8px;
        }

        .btn-group button{
            font-size:13px;
            padding:6px 0;
        }

        .btn-var{
            background:#dc3545;
            grid-column:span 4;
        }

        /* =========================
           MODAL
        ========================== */

        .modal{
            display:none;

            position:fixed;

            inset:0;

            background:rgba(0,0,0,.6);

            align-items:center;
            justify-content:center;

            z-index:100;

            backdrop-filter:blur(3px);
        }

        .modal-content{

            background:white;

            padding:25px;

            border-radius:15px;

            width:min(420px, calc(100vw - 30px));

            box-shadow:
            0 10px 30px rgba(0,0,0,.5);
        }

        .modal-content label{
            display:flex;
            align-items:center;
            gap:10px;

            margin-bottom:15px;

            font-size:16px;

            cursor:pointer;
        }

        .status-nuvem{
            border-radius:8px;
            padding:9px 10px;
            margin:12px 0 15px;
            font-size:14px;
            font-weight:700;
            border-left:5px solid #777;
            background:#f4f4f4;
            color:#333;
        }

        .status-nuvem.ok{
            border-left-color:#28a745;
            background:#eaf8ef;
            color:#1f7a39;
        }

        .status-nuvem.local{
            border-left-color:#ff7f00;
            background:#fff4e8;
            color:#9a4c00;
        }

        .status-nuvem.erro{
            border-left-color:#dc3545;
            background:#fdecee;
            color:#ad1f2d;
        }

        .btn-fechar{
            background:#dc3545;
            width:100%;
            padding:10px;
            margin-top:15px;
        }

        /* =========================
           TELA DE GOL
        ========================== */

        #golMsg{
            display:none;

            position:fixed;

            inset:0;

            background:rgba(0,0,0,.85);

            color:#fff;

            flex-direction:column;
            align-items:center;
            justify-content:center;

            z-index:999;
        }

        #golMsg.ativo{
            display:flex;
            animation:abreGol .25s ease both;
        }

        .texto-gol{
            font-size:120px;
            font-weight:900;
            color:#FFD700;

            text-shadow:
            0 0 20px var(--laranja),
            0 0 40px #FF0000;

            animation:
            pulsaGol .3s alternate infinite,
            brilhoGol 1.1s ease-in-out infinite;
        }

        .nome-gol{
            font-size:60px;
            margin-top:10px;
            text-transform:uppercase;
        }

        @keyframes pulsaGol{
            from{transform:scale(1);}
            to{transform:scale(1.1);}
        }

        @keyframes brilhoGol{
            0%,100%{
                text-shadow:
                0 0 20px var(--laranja),
                0 0 40px #FF0000;
            }

            50%{
                text-shadow:
                0 0 25px #fff,
                0 0 60px #FFD700,
                0 0 95px #FF0000;
            }
        }

        @keyframes abreGol{
            from{
                opacity:0;
                transform:scale(1.04);
            }

            to{
                opacity:1;
                transform:scale(1);
            }
        }

        @media (max-width:1100px){
            .layout{
                grid-template-columns:1fr;
                padding:12px;
            }

            .sidebar{
                order:-1;
                max-height:none;
            }

            .campo{
                min-height:1800px;
            }

            h1{
                font-size:22px;
            }

            .texto-gol{
                font-size:56px;
            }

            .nome-gol{
                font-size:30px;
            }
        }

    </style>

</head>

<body>

<!-- Áudios -->
<audio id="audioAmbiente" loop preload="none"></audio>
<audio id="audioGolFx" preload="none"></audio>
<audio id="audioApitoFx" preload="none"></audio>

<div class="decoracao-fundo" id="festaFundo"></div>

<header>

    <h1>
        🏆 Lab InovAção - Etapa II da 18ª Semana de Aperfeiçoamento Docente
    </h1>

    <button id="ativarSomBtn">
        🔊 Ativar Sons do Estádio
    </button>

</header>

<div class="layout">

    <div class="estadio-container">

        <div class="campo" id="campo">

            <div class="circulo"></div>

            <div class="area-gol"></div>

        </div>

    </div>

    <div class="sidebar">

        <div
            style="
                display:flex;
                justify-content:space-between;
                align-items:center;
                margin-bottom:15px;
            "
        >

            <h3 style="margin:0;border:none;">
                Nova Escalação
            </h3>

            <button
                onclick="abrirConfig()"
                style="
                    background:#555;
                    border-radius:20px;
                    padding:6px 12px;
                "
            >
                ⚙️ Configurações
            </button>

        </div>

        <div class="linha-add">

            <select id="avatarNovo">

                <option value="👤">👤</option>
                <option value="👩‍🏫">👩‍🏫</option>
                <option value="👨‍🏫">👨‍🏫</option>

                <option value="🤖">🤖</option>
                <option value="👽">👽</option>

                <option value="🐶">🐶</option>
                <option value="🦁">🦁</option>
                <option value="🦊">🦊</option>
                <option value="🦄">🦄</option>

                <option value="🚀">🚀</option>
                <option value="💡">💡</option>
                <option value="🔥">🔥</option>

            </select>

            <input
                id="nomeNovo"
                placeholder="Nome da Equipe / Jogador"
            >

        </div>

        <button
            class="btn-add"
            onclick="add()"
        >
            ➕ Entrar em Campo
        </button>

        <h3>Controle do Jogo</h3>

        <div id="controles"></div>

    </div>

</div>

<!-- Modal de Configurações -->
<div id="configModal" class="modal">
    <div class="modal-content">

        <h3 style="text-align:center;">
            ⚙️ Opções do Jogo
        </h3>

        <label>
            <input type="checkbox" id="somAmbiente">
            🏟️ Torcida de Fundo
        </label>

        <label>
            <input type="checkbox" id="somApito" checked>
            📢 Som de Apito
        </label>

        <label>
            <input type="checkbox" id="somGol" checked>
            🎉 Som de GOL
        </label>

        <label>
            <input type="checkbox" id="efeitoConfete" checked>
            🎊 Explosão de Confetes
        </label>

        <div id="statusNuvem" class="status-nuvem local">
            Nuvem: modo local
        </div>

        <hr>

        <button
            onclick="zerarTudo()"
            style="width:100%;background:#ff7f00;margin-bottom:5px;">
            🔄 Zerar Todos os Pontos
        </button>

        <button
            onclick="limparParticipantes()"
            style="width:100%;background:#dc3545;margin-bottom:5px;">
            🗑️ Remover Todos os Participantes
        </button>

        <button
            onclick="fecharConfig()"
            class="btn-fechar">
            Fechar
        </button>

    </div>
</div>

<div id="golMsg">
    <div class="texto-gol">GOOOOOOL!</div>
    <div class="nome-gol" id="nomeArtilheiro">Equipe</div>
</div>

    <script type="module">
    // 1. IMPORTAÇÕES DO FIREBASE (Usando links CDN para rodar direto no navegador/GitHub Pages)
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    // =================================================================
    // 2. SUAS CHAVES OFICIAIS DO FIREBASE
    // =================================================================
    const firebaseConfig = {
        apiKey: "AIzaSyB-XwlSKLe8qRkv9dPVnZxdvnUUXZmyo3A",
        authDomain: "ranking-fe83b.firebaseapp.com",
        projectId: "ranking-fe83b",
        storageBucket: "ranking-fe83b.firebasestorage.app",
        messagingSenderId: "436013642958",
        appId: "1:436013642958:web:1ed41d45ad740b5cf34c9f"
    };

    // 3. INICIALIZAR BANCO DE DADOS
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let participantes = [];
    const audioAmbiente = document.getElementById('audioAmbiente');
    const audioGol = document.getElementById('audioGolFx');

    // =================================================================
    // 4. MODO TEMPO REAL (Ouvindo o Firestore)
    // =================================================================
    onSnapshot(collection(db, "ranking"), (snapshot) => {
        participantes = [];
        snapshot.forEach((documento) => {
            participantes.push(documento.data());
        });
        render(); // Atualiza a tela instantaneamente quando você altera algo no celular
    });

    // Controle de Som
    document.getElementById('ativarSomBtn').onclick = () => {
        audioAmbiente.volume = 0.2;
        audioAmbiente.play();
        document.getElementById('ativarSomBtn').innerText = "🔊 Som Ativado";
    };

    // =================================================================
    // 5. FUNÇÕES GRAVANDO DIRETO NO FIREBASE (window.funcao)
    // =================================================================
    
    window.add = async function() {
        let n = document.getElementById('nomeNovo').value;
        if(!n) return;
        
        let idUnico = Date.now().toString(); // Cria um ID seguro para o Firebase
        let novoJogador = { id: idUnico, nome: n, avatar: document.getElementById('avatarNovo').value, pontos: 0 };
        
        await setDoc(doc(db, "ranking", idUnico), novoJogador); // Salva no banco
        document.getElementById('nomeNovo').value = '';
    }

    window.alterar = async function(id, v) {
        let p = participantes.find(x => x.id === id.toString() || x.id === id); // Busca o jogador
        if(p) {
            p.pontos = Math.max(0, p.pontos + v); // Não deixa ficar negativo
            
            // Toca o som localmente se bater a meta
            if(p.pontos >= 100) dispararGol(p.nome);
            
            await setDoc(doc(db, "ranking", p.id.toString()), p); // Atualiza no banco online
        }
    }

    window.excluirP = async function(id) {
        if(confirm('Excluir participante do campeonato?')) {
            await deleteDoc(doc(db, "ranking", id.toString())); // Deleta do banco online
        }
    }

    // =================================================================
    // 6. RENDERIZAÇÃO DA TELA
    // =================================================================
    
    function dispararGol(nome) {
        let m = document.getElementById('golMsg');
        document.getElementById('nomeArtilheiro').innerText = nome;
        m.style.display = 'flex';
        audioGol.play();
        if (typeof confetti === 'function') confetti();
        setTimeout(() => m.style.display = 'none', 4000);
    }

    function render() {
        document.getElementById('controles').innerHTML = participantes
            .sort((a,b) => b.pontos - a.pontos) // Ordena do maior para o menor na barra lateral
            .map(p => `
            <div class="card">
                <div><strong>${p.avatar} ${p.nome}</strong> - ${p.pontos} pts</div>
                <div class="btn-group">
                    <button onclick="alterar('${p.id}', 6)">+6</button>
                    <button onclick="alterar('${p.id}', 8)">+8</button>

const CLOUD_PATH = 'placares/copa-lab-animada';

// Para salvar na nuvem usando GitHub Pages, crie um projeto no Firebase
// Realtime Database e cole aqui as chaves de configuracao do seu app web.
const firebaseConfig = {
    apiKey: '',
    authDomain: '',
    databaseURL: '',
    projectId: '',
    storageBucket: '',
    messagingSenderId: '',
    appId: ''
};

const APP_STATE = {
    storageKey: 'copaLabAnimada',
    cloudRef: null,
    cloudReady: false,
    recebendoNuvem: false,
    primeiraLeituraNuvem: true,
    cloudSaveTimer: null,
    audioCtx: null,
    torcida: null,
    bufferTorcida: null,
    somAtivado: false,
    golTimer: null
};

function iniciarAplicacao() {
    participantes = normalizarParticipantes(participantes);
    salvarLocal();
    trocarBotaoSom();
    configurarEntradaPorEnter();
    render(false);
    iniciarNuvem();
}

function trocarBotaoSom() {
    const botaoAntigo = document.getElementById('ativarSomBtn');
    if (!botaoAntigo) return;

    const botaoNovo = botaoAntigo.cloneNode(true);
    botaoNovo.textContent = 'Ativar sons do estadio';
    botaoAntigo.parentNode.replaceChild(botaoNovo, botaoAntigo);
    botaoNovo.addEventListener('click', ativarSom);
}

function configurarEntradaPorEnter() {
    const inputNome = document.getElementById('nomeNovo');
    if (!inputNome) return;

    inputNome.addEventListener('keydown', event => {
        if (event.key === 'Enter') {
            add();
        }
    });
}

function normalizarParticipantes(lista) {
    const idsUsados = new Set();
    return (Array.isArray(lista) ? lista : [])
        .map(item => {
            let id = Number(item && item.id);
            if (!Number.isFinite(id) || idsUsados.has(id)) {
                id = gerarId();
            }
            idsUsados.add(id);
            return {
                id,
                nome: String(item && item.nome ? item.nome : '').trim().slice(0, 60),
                avatar: String(item && item.avatar ? item.avatar : '\uD83D\uDC64').slice(0, 12),
                pontos: Math.max(0, Number(item && item.pontos) || 0)
            };
        })
        .filter(item => item.nome);
}

function gerarId() {
    return Date.now() + Math.floor(Math.random() * 100000);
}

function salvarLocal() {
    localStorage.setItem(APP_STATE.storageKey, JSON.stringify(participantes));
}

function save() {
    salvarLocal();
    if (APP_STATE.cloudReady && !APP_STATE.recebendoNuvem) {
        agendarSalvarNuvem();
    }
}

function firebaseConfigValida() {
    return Boolean(
        firebaseConfig.apiKey &&
        firebaseConfig.databaseURL &&
        firebaseConfig.projectId &&
        firebaseConfig.appId
    );
}

function atualizarStatusNuvem(texto, tipo) {
    const status = document.getElementById('statusNuvem');
    if (!status) return;
    status.textContent = texto;
    status.className = `status-nuvem ${tipo || 'local'}`;
}

function iniciarNuvem() {
    if (!firebaseConfigValida()) {
        atualizarStatusNuvem('Nuvem: configure o Firebase no codigo', 'local');
        return;
    }

    if (!window.firebase || !firebase.database) {
        atualizarStatusNuvem('Nuvem: Firebase nao carregou', 'erro');
        return;
    }

    try {
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }

        APP_STATE.cloudRef = firebase.database().ref(CLOUD_PATH);
        APP_STATE.cloudReady = true;
        atualizarStatusNuvem('Nuvem: conectando...', 'local');

        APP_STATE.cloudRef.on('value', snapshot => {
            const dados = snapshot.val();

            if (dados && Array.isArray(dados.participantes)) {
                APP_STATE.recebendoNuvem = true;
                participantes = normalizarParticipantes(dados.participantes);
                salvarLocal();
                render(false);
                APP_STATE.recebendoNuvem = false;
                atualizarStatusNuvem('Nuvem: sincronizada', 'ok');
            } else if (APP_STATE.primeiraLeituraNuvem && participantes.length) {
                enviarNuvem();
            } else {
                atualizarStatusNuvem('Nuvem: conectada', 'ok');
            }

            APP_STATE.primeiraLeituraNuvem = false;
        }, erro => {
            console.warn('Erro ao ler Firebase:', erro);
            APP_STATE.cloudReady = false;
            atualizarStatusNuvem('Nuvem: erro de permissao', 'erro');
        });
    } catch (erro) {
        console.warn('Erro ao iniciar Firebase:', erro);
        APP_STATE.cloudReady = false;
        atualizarStatusNuvem('Nuvem: configuracao invalida', 'erro');
    }
}

function agendarSalvarNuvem() {
    clearTimeout(APP_STATE.cloudSaveTimer);
    APP_STATE.cloudSaveTimer = setTimeout(enviarNuvem, 450);
}
window.enviarNuvem = function(){
        if(!APP_STATE.cloudRef) return;

        APP_STATE.cloudRef
            .set({
                participantes: window.normalizarParticipantes(participantes),
                atualizadoEm: new Date().toISOString()
            })
            .then(() => {
                const hora = new Date().toLocaleTimeString(
                    'pt-BR',
                    {hour:'2-digit',minute:'2-digit'}
                );

                if(typeof window.atualizarStatusNuvem === 'function') window.atualizarStatusNuvem(`Nuvem: salvo as ${hora}`, 'ok');
            })
            .catch(erro => {
                console.warn('Erro ao salvar Firebase:', erro);
                if(typeof window.atualizarStatusNuvem === 'function') window.atualizarStatusNuvem('Nuvem: erro ao salvar', 'erro');
            });
    }

    window.obterAudioCtx = function(){
        const AudioAPI = window.AudioContext || window.webkitAudioContext;
        if(!AudioAPI) return null;

        if(!APP_STATE.audioCtx || APP_STATE.audioCtx.state === 'closed'){
            APP_STATE.audioCtx = new AudioAPI();
        }

        return APP_STATE.audioCtx;
    }

    window.prepararAudio = async function(){
        const ctx = window.obterAudioCtx();

        if(!ctx){
            throw new Error('Web Audio indisponivel');
        }

        APP_STATE.somAtivado = true;
        window.atualizarBotaoSom(true);

        if(ctx.state === 'suspended'){
            await Promise.race([
                ctx.resume().catch(() => {}),
                new Promise(resolve => setTimeout(resolve, 250))
            ]);
        }

        return ctx;
    }

    window.atualizarBotaoSom = function(ativo,erro){
        const botao = document.getElementById('ativarSomBtn');
        if(!botao) return;

        if(erro){
            botao.textContent = 'Som indisponivel';
            botao.classList.remove('som-ligado');
            return;
        }

        botao.textContent = ativo ? 'Sons ativados' : 'Ativar sons do estadio';
        botao.classList.toggle('som-ligado', Boolean(ativo));
    }

    window.ativarSom = function(){
        const ambiente = document.getElementById('somAmbiente');
        if(ambiente) ambiente.checked = true;

        window.prepararAudio()
            .then(() => {
                window.iniciarTorcida();
                window.tocarApito(true);
            })
            .catch(() => window.atualizarBotaoSom(false,true));
    }

    window.criarBufferTorcida = function(ctx){
        if(APP_STATE.bufferTorcida) return APP_STATE.bufferTorcida;

        const duracao = 2;
        const buffer = ctx.createBuffer(
            1,
            ctx.sampleRate * duracao,
            ctx.sampleRate
        );
        const dados = buffer.getChannelData(0);

        for(let i=0;i<dados.length;i++){
            const ruido = (Math.random() * 2 - 1) * .34;
            const onda = Math.sin(i / 34) * .045;
            dados[i] = ruido + onda;
        }

        APP_STATE.bufferTorcida = buffer;
        return buffer;
    }

    window.iniciarTorcida = function(){
        const ambiente = document.getElementById('somAmbiente');
        if(ambiente && !ambiente.checked) return;
        if(APP_STATE.torcida) return;

        window.prepararAudio()
            .then(ctx => {
                const source = ctx.createBufferSource();
                const filter = ctx.createBiquadFilter();
                const gain = ctx.createGain();
                const lfo = ctx.createOscillator();
                const lfoGain = ctx.createGain();

                source.buffer = window.criarBufferTorcida(ctx);
                source.loop = true;

                filter.type = 'bandpass';
                filter.frequency.value = 620;
                filter.Q.value = .75;

                gain.gain.value = .032;

                lfo.frequency.value = .32;
                lfoGain.gain.value = .008;

                source.connect(filter);
                filter.connect(gain);
                gain.connect(ctx.destination);
                lfo.connect(lfoGain);
                lfoGain.connect(gain.gain);

                source.start();
                lfo.start();

                APP_STATE.torcida = {source,filter,gain,lfo,lfoGain};
            })
            .catch(() => window.atualizarBotaoSom(false,true));
    }

    window.pararTorcida = function(){
        if(!APP_STATE.torcida || !APP_STATE.audioCtx) return;

        const ctx = APP_STATE.audioCtx;
        const torcidaAtual = APP_STATE.torcida;
        APP_STATE.torcida = null;

        try{
            torcidaAtual.gain.gain.setTargetAtTime(.0001, ctx.currentTime, .18);

            setTimeout(() => {
                try{
                    torcidaAtual.source.stop();
                    torcidaAtual.lfo.stop();
                    torcidaAtual.source.disconnect();
                    torcidaAtual.lfo.disconnect();
                }catch(erro){
                    console.warn('Erro ao parar torcida:', erro);
                }
            }, 360);
        }catch(erro){
            console.warn('Erro ao encerrar audio ambiente:', erro);
        }
    }

    window.toggleAmbiente = function(){
        if(document.getElementById('somAmbiente').checked){
            window.iniciarTorcida();
        }else{
            window.pararTorcida();
        }
    }

    window.tocarTom = function(ctx,frequencia,inicio,duracao,volume,tipo,frequenciaFinal){
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();

        osc.type = tipo || 'sine';
        osc.frequency.setValueAtTime(frequencia, inicio);

        if(frequenciaFinal){
            osc.frequency.exponentialRampToValueAtTime(
                frequenciaFinal,
                inicio + duracao * .88
            );
        }

        gain.gain.setValueAtTime(.0001, inicio);
        gain.gain.exponentialRampToValueAtTime(volume, inicio + .018);
        gain.gain.exponentialRampToValueAtTime(.0001, inicio + duracao);

        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.start(inicio);
        osc.stop(inicio + duracao + .05);
    }

    window.tocarRuido = function(ctx,inicio,duracao,volume,frequencia,tipo){
        const tamanho = Math.max(1, Math.floor(ctx.sampleRate * duracao));
        const buffer = ctx.createBuffer(1, tamanho, ctx.sampleRate);
        const dados = buffer.getChannelData(0);

        for(let i=0;i<tamanho;i++){
            const progresso = i / tamanho;
            const envelope = Math.sin(Math.PI * progresso);
            dados[i] = (Math.random() * 2 - 1) * envelope;
        }

        const source = ctx.createBufferSource();
        const filter = ctx.createBiquadFilter();
        const gain = ctx.createGain();

        source.buffer = buffer;
        filter.type = tipo || 'bandpass';
        filter.frequency.value = frequencia || 850;
        filter.Q.value = .9;
        gain.gain.value = volume;

        source.connect(filter);
        filter.connect(gain);
        gain.connect(ctx.destination);
        source.start(inicio);
        source.stop(inicio + duracao);
    }

    window.tocarApito = function(curto){
        if(!document.getElementById('somApito').checked) return;

        window.prepararAudio()
            .then(ctx => {
                const inicio = ctx.currentTime + .01;
                const duracao = curto ? .13 : .24;

                window.tocarTom(ctx, 1450, inicio, duracao, .13, 'sine', 1900);
                window.tocarTom(ctx, 980, inicio + duracao * .55, duracao * .78, .08, 'square', 1280);
            })
            .catch(() => {});
    }

    window.tocarGol = function(){
        if(!document.getElementById('somGol').checked) return;

        window.prepararAudio()
            .then(ctx => {
                const inicio = ctx.currentTime + .02;
                const notas = [392,523,659,784,1046];

                notas.forEach((nota,indice) => {
                    window.tocarTom(ctx, nota, inicio + indice * .09, .22, .09, 'triangle');
                });

                window.tocarRuido(ctx, inicio + .16, 1.45, .18, 780, 'bandpass');
                window.tocarRuido(ctx, inicio + .55, .75, .12, 1250, 'highpass');
            })
            .catch(() => {});
    }

    window.add = function(){
        const inputNome = document.getElementById('nomeNovo');
        const nome = inputNome.value.trim();

        if(!nome){

        participantes.push({

    window.editar = function(id,valor){

    window.alterar = function(id,valor){

        if(!p) return;

        const anterior = p.pontos;
        p.pontos = Math.max(0, p.pontos + valor);

        const marcouGol = valor > 0 && p.pontos >= 100 && anterior < 100;

        window.render();

        if(valor > 0){
            window.animarBola(id);
            window.mostrarPontos(id, valor);
        }

        if(marcouGol){
            window.dispararGol(p.nome);
        }else if(valor > 0){
            window.tocarApito();
        }
    }

    window.dispararGol = function(nome){
        const modal = document.getElementById('golMsg');
        const nomeArtilheiro = document.getElementById('nomeArtilheiro');

        nomeArtilheiro.innerText = nome;

    window.mostrarPontos = function(id,valor){

        }
    }

    window.limparParticipantes = function(){
        if(confirm('Remover todos os participantes?')){
            participantes = [];
            window.render();
            if(typeof window.fecharConfig === 'function') window.fecharConfig();
        }
    }

    window.escapeHTML = function(valor){
        return String(valor).replace(/[&<>"']/g, char => ({
            '&':'&amp;',
            '<':'&lt;',
            '>':'&gt;',
            '"':'&quot;',
            "'":'&#39;'
        }[char]));
    }

    // Inicializa a aplicação
    window.iniciarAplicacao();
</script>
</body>
</html>
