<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Ranking Lab InovAção - Campo de Futebol</title>
    <style>
        :root { --azul: #005596; --laranja: #FF7F00; --grama: #2d8a32; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f0f0; padding: 20px; }
        .dashboard { max-width: 900px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
        h1 { color: var(--azul); text-align: center; margin-bottom: 5px; }
        p { text-align: center; color: #666; font-style: italic; margin-bottom: 30px; }
        
        /* O Campo */
        .campo { background: var(--grama); padding: 30px; border: 4px solid white; border-radius: 10px; position: relative; }
        .trilha { height: 40px; background: rgba(0,0,0,0.2); margin: 15px 0; border-radius: 20px; position: relative; display: flex; align-items: center; }
        .jogador-bola { font-size: 25px; transition: left 1s ease; position: absolute; left: 0; }
        .nome-jogador { color: white; font-weight: bold; margin-bottom: 5px; text-shadow: 1px 1px 2px #000; }

        /* Painel Editável */
        .painel-edicao { background: #eee; padding: 15px; border-radius: 10px; margin-bottom: 20px; border: 2px dashed var(--azul); }
        input { padding: 5px; width: 60px; }
        button { background: var(--laranja); color: white; border: none; padding: 5px 15px; cursor: pointer; border-radius: 5px; }
    </style>
</head>
<body>

<div class="dashboard">
    <h1>Etapa II da 18ª Semana de Aperfeiçoamento Docente</h1>
    <p>Lab InovAção: um espaço para compartilhar experiências, trocar conhecimentos e inspirar novas práticas</p>

    <!-- PAINEL DE CONTROLE -->
    <div class="painel-edicao">
        <strong>Gerenciar Pontos:</strong><br>
        <input type="text" id="nome1" placeholder="Nome"> <input type="number" id="pts1" placeholder="Pts"> 
        <button onclick="atualizar(1)">Atualizar</button>
    </div>

    <!-- CAMPO -->
    <div class="campo">
        <div id="linha1" class="trilha">
            <div id="bola1" class="jogador-bola">⚽</div>
        </div>
        <div id="nomeDisplay1" class="nome-jogador">Jogador 1</div>
    </div>
</div>

<script>
    function atualizar(id) {
        let nome = document.getElementById('nome'+id).value;
        let pts = document.getElementById('pts'+id).value;
        
        // Atualiza nome
        document.getElementById('nomeDisplay'+id).innerText = nome;
        
        // Atualiza bola (max 90% para não sair do campo)
        let posicao = pts > 90 ? 90 : pts;
        document.getElementById('bola1').style.left = posicao + "%";
    }
</script>

</body>
</html>
