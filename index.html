<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lab InovAção - Copa do Mundo</title>
<style>
:root{--azul:#005596;--laranja:#ff7f00;}
*{box-sizing:border-box}
body{margin:0;font-family:Segoe UI,Arial,sans-serif;background:#eef2f5}
header{background:linear-gradient(90deg,var(--azul),#0d74c5);color:#fff;text-align:center;padding:15px}
.layout{display:grid;grid-template-columns:1fr 360px;gap:12px;padding:12px}
.estadio{background:#444;color:#fff;padding:8px;text-align:center;font-size:20px;overflow:hidden;white-space:nowrap}
.torcida{display:inline-block;animation:move 12s linear infinite}
@keyframes move{from{transform:translateX(100%)}to{transform:translateX(-100%)}}
.campo{position:relative;height:850px;border-radius:12px;overflow:auto;border:5px solid #fff;
background:repeating-linear-gradient(90deg,#1d7a2a 0,#1d7a2a 120px,#278c36 120px,#278c36 240px)}
.campo:before{content:"";position:absolute;left:50%;top:0;bottom:0;width:4px;background:#fff}
.circulo{position:absolute;left:50%;top:50%;width:180px;height:180px;border:4px solid #fff;border-radius:50%;transform:translate(-50%,-50%)}
.gol{position:absolute;right:0;top:50%;transform:translateY(-50%);width:40px;height:220px;border:4px solid #fff;border-right:none}
.player{position:absolute;transition:all 1s ease}
.bola{font-size:32px;animation:girar 2s linear infinite}
@keyframes girar{from{transform:rotate(0)}to{transform:rotate(360deg)}}
.nome,.pts{color:#fff;text-shadow:1px 1px 2px #000;font-size:12px;font-weight:bold}
.sidebar{background:#fff;border-radius:12px;padding:12px;max-height:900px;overflow:auto}
input,textarea{width:100%;padding:8px;margin:4px 0}
button{border:none;border-radius:6px;padding:6px 10px;margin:2px;color:#fff;background:var(--azul);cursor:pointer}
.laranja{background:var(--laranja)}
.rank{display:flex;justify-content:space-between;padding:6px;border-bottom:1px solid #ddd}
.card{border:1px solid #ddd;border-radius:8px;padding:8px;margin:6px 0}
#golMsg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);color:#fff;font-size:48px;
align-items:center;justify-content:center;z-index:999}
</style>
</head>
<body>
<header>
<h1>🏆 Lab InovAção - Copa do Mundo</h1>
<p>Meta: 100 pontos</p>
</header>

<div class="estadio"><div class="torcida">🏳️ ⚽ 🎉 🏳️ VAMOS TORCIDA! 🏳️ ⚽ 🎉 🏳️</div></div>

<div class="layout">
<div>
<div class="campo" id="campo">
<div class="circulo"></div>
<div class="gol"></div>
</div>
</div>

<div class="sidebar">
<h3>Adicionar Participante</h3>
<input id="nomeNovo" placeholder="Nome">
<button onclick="add()">Adicionar</button>

<h3>Som</h3>
<label><input type="checkbox" id="somGol" checked> Som de Gol</label><br>
<label><input type="checkbox" id="somTorcida" checked> Torcida</label><br>
<label><input type="checkbox" id="silencioso"> Modo silencioso</label>

<hr>
<button onclick="zerarTudo()">🔄 Zerar Pontuações</button>
<button class="laranja" onclick="removerTodos()">🗑️ Remover Todos</button>

<h3>Ranking</h3>
<div id="ranking"></div>

<h3>Controle</h3>
<div id="controles"></div>
</div>
</div>

<div id="golMsg">⚽ GOOOOOOL! ⚽</div>

<script>
let participantes=JSON.parse(localStorage.getItem('copaLab')||'[]');

function save(){localStorage.setItem('copaLab',JSON.stringify(participantes));}

function add(){
let n=document.getElementById('nomeNovo').value.trim();
if(!n)return;
participantes.push({id:Date.now(),nome:n,pontos:0});
document.getElementById('nomeNovo').value='';
render();
}

function editar(id,v){
let p=participantes.find(x=>x.id===id);
if(p){p.nome=v;save();render();}
}

function alterar(id,v){
let p=participantes.find(x=>x.id===id);
if(!p)return;
p.pontos=Math.max(0,p.pontos+v);
if(p.pontos>=100)gol(p.nome);
render();
}

function excluirP(id){
participantes=participantes.filter(x=>x.id!==id);
render();
}

function zerarP(id){
let p=participantes.find(x=>x.id===id);
if(p){p.pontos=0;render();}
}

function zerarTudo(){participantes.forEach(p=>p.pontos=0);render();}
function removerTodos(){if(confirm('Remover todos?')){participantes=[];render();}}

function gol(nome){
if(document.getElementById('silencioso').checked)return;
let m=document.getElementById('golMsg');
m.innerHTML='⚽ GOOOOOOL!<br>'+nome;
m.style.display='flex';
setTimeout(()=>m.style.display='none',3000);

if(document.getElementById('somGol').checked){
let ctx=new(window.AudioContext||window.webkitAudioContext)();
let o=ctx.createOscillator(); let g=ctx.createGain();
o.connect(g); g.connect(ctx.destination);
o.frequency.value=600; o.start();
g.gain.exponentialRampToValueAtTime(0.0001,ctx.currentTime+0.5);
o.stop(ctx.currentTime+0.5);
}
}

function render(){
save();

let rank=[...participantes].sort((a,b)=>b.pontos-a.pontos);

document.getElementById('ranking').innerHTML=rank.map((p,i)=>
`<div class='rank'>${i==0?'🥇':i==1?'🥈':i==2?'🥉':(i+1)+'º'} ${p.nome}<b>${p.pontos}</b></div>`).join('');

document.getElementById('controles').innerHTML=participantes.map(p=>`
<div class='card'>
<input value="${p.nome}" onchange="editar(${p.id},this.value)">
<div>${p.pontos} pts</div>
<button onclick="alterar(${p.id},10)">+10</button>
<button onclick="alterar(${p.id},20)">+20</button>
<button onclick="alterar(${p.id},50)">+50</button>
<button class="laranja" onclick="alterar(${p.id},-10)">-10</button><br>
<button onclick="zerarP(${p.id})">🔄</button>
<button class="laranja" onclick="excluirP(${p.id})">🗑️</button>
</div>`).join('');

let campo=document.getElementById('campo');
campo.querySelectorAll('.player').forEach(e=>e.remove());

rank.forEach((p,i)=>{
let d=document.createElement('div');
d.className='player';
d.style.top=(20+i*40)+'px';
d.style.left=Math.min((p.pontos/100)*90,90)+'%';
d.innerHTML=`<div class='nome'>${p.nome}</div><div class='bola'>⚽</div><div class='pts'>${p.pontos} pts</div>`;
campo.appendChild(d);
});
}
render();
</script>
</body>
</html>
